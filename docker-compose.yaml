services:
  DoD:
    container_name: DoD
    image: it-crm:v0.1
    build: .
    ports:
      - "3000:3000"
    networks:
      - DoD-CRM-NETWORK
    depends_on:
      - mongodb

  mongodb:
    image: mongo:latest
    container_name: mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: DoD_CRM_DATABASE_25
    volumes:
      - mongodb_data:/data/db
    networks:
      - DoD-CRM-NETWORK

networks:
  DoD-CRM-NETWORK:
    driver: bridge

volumes:
  mongodb_data:
